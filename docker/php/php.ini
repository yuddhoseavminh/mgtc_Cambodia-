; Custom PHP settings for Army Registration System

upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 256M
max_execution_time = 120
max_input_vars = 3000

; Show errors only in dev (override per environment)
display_errors = Off
log_errors = On
error_log = /var/log/php_errors.log

; Timezone
date.timezone = "Asia/Phnom_Penh"
