services:
  # ── Application ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: army_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ""                        # generated by entrypoint
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: army_db
      DB_USERNAME: army_user
      DB_PASSWORD: army_secret
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - army_network

  # ── MySQL database ────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: army_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: army_db
      MYSQL_USER: army_user
      MYSQL_PASSWORD: army_secret
    ports:
      - "3307:3306"          # expose on 3307 to avoid conflict with local MySQL
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - army_network

  # ── phpMyAdmin (optional – for local dev convenience) ─────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: army_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root_secret
    depends_on:
      - db
    networks:
      - army_network

volumes:
  db_data:
  storage_data:

networks:
  army_network:
    driver: bridge
