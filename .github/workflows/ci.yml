name: CI – Build & Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ─────────────────────────────────────────────────────────
  #  Job 1: Run PHPUnit tests
  # ─────────────────────────────────────────────────────────
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_secret
          MYSQL_DATABASE: army_db_testing
          MYSQL_USER: army_user
          MYSQL_PASSWORD: army_secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot_secret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo_mysql, bcmath, gd, zip, exif, pcntl, opcache
          coverage: none

      - name: 📦 Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: 🔧 Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: 📋 Copy .env for testing
        run: cp .env.example .env

      - name: 🔑 Generate application key
        run: php artisan key:generate

      - name: 🏗️ Setup Node & build assets
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install NPM packages
        run: npm ci

      - name: 🎨 Build Vite assets
        run: npm run build

      - name: 🗄️ Run migrations & seed test data
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: army_db_testing
          DB_USERNAME: army_user
          DB_PASSWORD: army_secret
        run: |
          php artisan migrate --force
          php artisan db:seed --force

      - name: 🧪 Run PHPUnit tests
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: army_db_testing
          DB_USERNAME: army_user
          DB_PASSWORD: army_secret
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          CACHE_STORE: array
        run: php artisan test

  # ─────────────────────────────────────────────────────────
  #  Job 2: Build Docker image (runs only on main/master)
  # ─────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ Generate image tag
        id: meta
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: 🔨 Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false          # ← change to true + add registry login to push
          tags: |
            army-register:latest
            army-register:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
